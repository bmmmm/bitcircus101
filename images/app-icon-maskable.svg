<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <rect width="180" height="180" fill="#0d0d0d"/>
  <!-- Smaller "101" than app-icon.svg: keeps the glyph inside the maskable
       safe zone (central 80% circle) so Android adaptive masks don't clip it. -->
  <text x="90" y="90" font-family="monospace" font-size="58" font-weight="bold" fill="#00d97e" text-anchor="middle" dominant-baseline="central">101</text>
</svg>
