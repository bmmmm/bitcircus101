name: Update funding level

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      percent:
        description: "Funding percentage (0-100)"
        required: true
        type: number

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: live
          persist-credentials: true

      - name: Update funding.json
        env:
          PERCENT: ${{ inputs.percent }}
        run: |
          printf '{ "percent": %d }\n' "$PERCENT" > funding.json

      - name: Commit
        env:
          PERCENT: ${{ inputs.percent }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add funding.json
          git diff --cached --quiet && echo "No changes" || git commit -m "Update funding to ${PERCENT}%"
          git pull --rebase origin live
          git push origin HEAD:live
