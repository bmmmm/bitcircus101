name: Generate sitemap

permissions:
  contents: write

on:
  push:
    branches: [live]
    paths:
      - "*.html"
      - "*.css"
      - "*.js"
  workflow_dispatch:

concurrency:
  group: sitemap
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: live
          fetch-depth: 0
          persist-credentials: true

      - name: Generate sitemap.xml
        uses: cicirello/generate-sitemap@v1.10.1
        id: sitemap
        with:
          base-url-path: https://bitcircus101.de
          path-to-root: .
          include-html: true
          sitemap-format: xml

      - name: Remove excluded pages from sitemap
        run: |
          python3 -c "
          import re
          with open('sitemap.xml') as f: xml = f.read()
          # Remove Google verification files
          xml = re.sub(r'<url>\s*<loc>[^<]*google[^<]*</loc>.*?</url>', '', xml, flags=re.DOTALL)
          # Remove noindex pages (dankedankedanke)
          xml = re.sub(r'<url>\s*<loc>[^<]*dankedankedanke[^<]*</loc>.*?</url>', '', xml, flags=re.DOTALL)
          with open('sitemap.xml', 'w') as f: f.write(xml)
          "

      - name: Commit sitemap
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --cached --quiet && echo "No changes" || git commit -m "Update sitemap"
          git pull --rebase origin live
          git push origin HEAD:live
