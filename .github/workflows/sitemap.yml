name: Generate sitemap

permissions:
  contents: write

on:
  push:
    branches: [live]
    paths:
      - "*.html"
      - "ascii/**"
      - "*.css"
      - "*.js"
  workflow_dispatch:

concurrency:
  group: sitemap
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: live
          fetch-depth: 0
          persist-credentials: true

      # generate-sitemap already honors <meta name="robots" content="noindex">
      # and robots.txt Disallow entries, so pages like 404.html, dankedankedanke.html,
      # /ascii/, /lite/, /invite-*/ and /join-*/ are excluded automatically.
      # exclude-paths only needs the two pages that carry no noindex meta but
      # still shouldn't be listed: the Google verification stub and donations.html
      # (kept out of the sitemap for editorial reasons only).
      - name: Generate sitemap.xml
        uses: cicirello/generate-sitemap@6a56a20238e631d653600cf792c3596722b78259 # v1.10.4
        id: sitemap
        with:
          base-url-path: https://bitcircus101.de
          path-to-root: .
          include-html: true
          sitemap-format: xml
          exclude-paths: /google18556084d38e4dd8.html /donations.html

      - name: Commit sitemap
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --cached --quiet && echo "No changes" || git commit -m "Update sitemap"
          git pull --rebase origin live
          git push origin HEAD:live
