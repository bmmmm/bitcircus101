name: Generate sitemap

permissions:
  contents: write

on:
  push:
    branches: [live]
    paths:
      - "*.html"
      - "ascii/**"
      - "*.css"
      - "*.js"
  workflow_dispatch:

concurrency:
  group: sitemap
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: live
          fetch-depth: 0
          persist-credentials: true

      - name: Generate sitemap.xml
        uses: cicirello/generate-sitemap@v1.10.4
        id: sitemap
        with:
          base-url-path: https://bitcircus101.de
          path-to-root: .
          include-html: true
          sitemap-format: xml

      - name: Remove excluded pages from sitemap
        run: |
          node -e "
          const fs = require('fs');
          let xml = fs.readFileSync('sitemap.xml', 'utf8');
          // Remove Google verification files, noindex pages, hidden playground
          for (const p of ['google', 'dankedankedanke', '/ascii/']) {
            xml = xml.replace(new RegExp('<url>\\\\s*<loc>[^<]*' + p + '[^<]*</loc>[\\\\s\\\\S]*?</url>', 'g'), '');
          }
          fs.writeFileSync('sitemap.xml', xml.replace(/\\n{3,}/g, '\\n\\n'));
          "

      - name: Commit sitemap
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --cached --quiet && echo "No changes" || git commit -m "Update sitemap"
          git pull --rebase origin live
          git push origin HEAD:live
