name: Generate sitemap

permissions:
  contents: write

on:
  push:
    branches: [live]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Generate sitemap.xml
        uses: cicirello/generate-sitemap@v1.10.1
        id: sitemap
        with:
          base-url-path: https://bitcircus101.de
          path-to-root: .
          include-html: true
          sitemap-format: xml

      - name: Remove verification files from sitemap
        run: |
          sed -i '/<loc>.*google[^<]*<\/loc>/,/<\/url>/d' sitemap.xml

      - name: Commit sitemap
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --cached --quiet && echo "No changes" || git commit -m "Update sitemap"
          git push origin HEAD:${GITHUB_REF#refs/heads/}
