name: Sync calendar events

permissions:
  contents: write

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes
  push:
    branches: [live]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch ICS and generate events JSON + RSS
        run: node scripts/sync-events.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events-data.json feed.xml
          git diff --cached --quiet && echo "No changes" || git commit -m "Sync events from Nextcloud calendar"
          git push origin HEAD:${GITHUB_REF#refs/heads/}
