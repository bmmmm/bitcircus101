name: Sync calendar events

permissions:
  contents: write

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes
  workflow_dispatch:

concurrency:
  group: sync-events
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: live
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch ICS and generate events JSON + RSS
        run: node scripts/sync-events.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events-data.json feed.xml
          git diff --cached --quiet && echo "No changes" || git commit -m "Sync events from Nextcloud calendar"
          git pull --rebase origin live
          git push origin HEAD:live
