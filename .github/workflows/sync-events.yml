name: Sync calendar events

permissions:
  contents: write

on:
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes
  workflow_dispatch:

concurrency:
  group: sync-events
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: live
          persist-credentials: true

      - name: Use scripts and config from main
        run: |
          git fetch origin main
          git checkout origin/main -- scripts/ calendars.json

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Fetch ICS and generate events JSON + RSS
        run: node scripts/sync-events.mjs

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events-data.json feed.xml
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Sync events from Nextcloud calendar"
          # Retry loop: pull --rebase + push (handles concurrent pushes)
          for i in 1 2 3; do
            git pull --rebase origin live && git push origin HEAD:live && exit 0
            echo "Retry $i..."
            sleep 5
          done
          echo "Push failed after 3 retries"
          exit 1
