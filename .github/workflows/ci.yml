name: PR checks

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "LICENSE"
      - ".claudeignore"
      - ".gitignore"
      - "llms.txt"

jobs:
  quick-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Verify layout HTML matches partials and logo slider
        run: |
          node scripts/inject-layout.mjs
          node scripts/build-logo-slider.mjs
          git diff --exit-code -- '*.html' || (
            echo "::error::HTML drift: run npm run build:layout and npm run build:logos, then commit the updated HTML files."
            exit 1
          )

      - name: Run unit tests
        run: node --test tests/sync-events.spec.mjs
