name: PR checks

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "LICENSE"
      - ".claudeignore"
      - ".gitignore"
      - "llms.txt"

permissions:
  contents: read

jobs:
  quick-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Verify layout HTML matches partials and logo slider
        run: |
          # build-lite-events.mjs is intentionally NOT part of this gate: it stamps
          # today's date + live event data into lite/index.html, so that file can
          # never be drift-free in a PR. It is a deploy-time artifact like
          # sitemap.xml — regenerated in deploy.yml, never gated here.
          node scripts/inject-layout.mjs
          node scripts/build-logo-slider.mjs
          git diff --exit-code -- '*.html' || (
            echo "::error::HTML drift: run pnpm run build:layout and pnpm run build:logos, then commit the updated HTML files."
            exit 1
          )

      - name: Run unit tests
        run: node --test tests/sync-events.spec.mjs
