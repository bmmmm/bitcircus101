name: PR checks

on:
  pull_request:
    branches: [main]

jobs:
  quick-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Run unit tests
        run: node --test tests/sync-events.spec.mjs
