name: Test & Deploy to live

permissions:
  contents: write

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Browsers + OS deps are baked into the image, so there is no fragile
    # `playwright install --with-deps` download step (which hung repeatedly and
    # which caching can't save us from: this site deploys less often than the
    # 7-day cache-eviction window, so the browser cache is always cold). The tag
    # MUST match the pinned @playwright/test version in package.json.
    container: mcr.microsoft.com/playwright:v1.58.2-jammy
    # Match the calendar's Europe/Berlin floating-local times when generating
    # events-data.json / feed.xml and running the (date-sensitive) unit tests.
    env:
      TZ: Europe/Berlin
    steps:
      - uses: actions/checkout@v6

      # The container runs as root but the checkout is owned by the runner uid, so
      # git refuses the repo ("dubious ownership" → "not a git repository") and the
      # `git diff` drift check below fails. Mark the workspace trusted first.
      - name: Trust workspace for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify HTML matches layout partials and logo slider
        run: |
          node scripts/inject-layout.mjs
          node scripts/build-logo-slider.mjs
          git diff --exit-code -- '*.html' || (
            echo "::error::HTML drift: run npm run build:layout and npm run build:logos, then commit."
            exit 1
          )

      - name: Run sync-events unit tests
        run: node --test tests/sync-events.spec.mjs

      - name: Generate events-data.json for E2E tests
        run: |
          node scripts/sync-events.mjs || {
            echo "::warning::Calendar fetch failed — using minimal test fixture"
            echo '{"lastSync":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'","sources":[],"events":[]}' > events-data.json
          }

      - name: Run Playwright tests
        run: npx playwright test

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    needs: test
    runs-on: ubuntu-latest
    # Same TZ pin as the test job for the events-data.json regeneration fallback.
    env:
      TZ: Europe/Berlin
    steps:
      - uses: actions/checkout@v6
        with:
          ref: live
          persist-credentials: true

      - name: Sync all site files from main
        run: |
          git fetch origin main

          # Save live-only generated files before overlay
          for f in events-data.json feed.xml funding.json sitemap.xml; do
            [ -f "$f" ] && cp "$f" "/tmp/_live_$f"
          done

          # Overlay everything from main, then remove dev-only files
          git checkout origin/main -- .
          rm -rf tests/ node_modules/ .claude/
          rm -f playwright.config.js package.json package-lock.json

          # Restore live-only generated files
          for f in events-data.json feed.xml funding.json sitemap.xml; do
            [ -f "/tmp/_live_$f" ] && cp "/tmp/_live_$f" "$f"
          done

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Apply layout partials and logo slider to HTML
        run: |
          node scripts/inject-layout.mjs
          node scripts/build-logo-slider.mjs

      - name: Minify CSS and JS
        run: |
          echo "Before: style.css=$(wc -c < style.css)B main.js=$(wc -c < main.js)B events.js=$(wc -c < events.js)B ics-core.js=$(wc -c < ics-core.js)B"
          npx --yes csso-cli style.css -o style.css
          npx --yes terser main.js -o main.js --compress --mangle
          npx --yes terser events.js -o events.js --compress --mangle
          npx --yes terser ics-core.js -o ics-core.js --compress --mangle
          echo "After:  style.css=$(wc -c < style.css)B main.js=$(wc -c < main.js)B events.js=$(wc -c < events.js)B ics-core.js=$(wc -c < ics-core.js)B"

      - name: Cache-bust asset references
        run: |
          # Generate a short content hash from all cacheable assets (post-minification)
          HASH=$(cat style.css main.js events.js ics-core.js 2>/dev/null | sha256sum | cut -c1-8)
          echo "Asset hash: $HASH"
          # Replace ?v=anything with ?v=<hash> in all HTML files
          sed -i "s/?v=[a-zA-Z0-9_-]*/?v=$HASH/g" *.html
          for d in ascii chat invite-info invite-talk join-info join-talk; do
            for f in "$d"/*.html; do
              [ -f "$f" ] && sed -i "s/?v=[a-zA-Z0-9_-]*/?v=$HASH/g" "$f"
            done
          done

      - name: Regenerate events data if missing
        run: |
          if [ ! -f events-data.json ]; then
            echo "events-data.json missing — regenerating"
            node scripts/sync-events.mjs
          fi

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi
          COMMIT_MSG=$(git log origin/main -1 --pretty=format:"%s")
          git commit -m "Deploy: ${COMMIT_MSG}"
          for i in 1 2 3; do
            git pull --rebase origin live && git push origin HEAD:live && exit 0
            echo "Retry $i..."
            sleep 5
          done
          echo "Push failed after 3 retries"
          exit 1
