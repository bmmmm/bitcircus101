name: Test & Deploy to live

permissions:
  contents: write

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run sync-events unit tests
        run: node --test tests/sync-events.spec.mjs

      - name: Generate test events-data.json for local tests
        run: node scripts/sync-events.mjs

      - name: Run Playwright tests
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: live
          persist-credentials: true

      - name: Sync all site files from main
        run: |
          git fetch origin main

          # List of files/dirs that belong on live
          # (excludes dev-only: tests/, node_modules/, playwright.config.js, package*.json, .github/)
          git checkout origin/main -- \
            index.html \
            events.html \
            donations.html \
            raum-nutzen.html \
            impressum-datenschutz.html \
            dankedankedanke.html \
            style.css \
            events.js \
            main.js \
            calendars.json \
            scripts/ \
            images/ \
            README.md \
            google18556084d38e4dd8.html \
            robots.txt \
            .gitignore

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi
          COMMIT_MSG=$(git log origin/main -1 --pretty=format:"%s")
          git commit -m "Deploy: ${COMMIT_MSG}"
          for i in 1 2 3; do
            git pull --rebase origin live && git push origin HEAD:live && exit 0
            echo "Retry $i..."
            sleep 5
          done
          echo "Push failed after 3 retries"
          exit 1
